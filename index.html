<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alle</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#080808; overflow:hidden; font-family:'Raleway',sans-serif; }
  canvas { position:fixed; inset:0; }
  .vignette {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(ellipse at center, transparent 35%, rgba(8,8,8,0.82) 100%);
  }
  #hint {
    position:fixed; bottom:38px; left:50%; transform:translateX(-50%);
    font-weight:200; font-size:11px; letter-spacing:0.5em;
    color:rgba(255,255,255,0.18); z-index:20; text-transform:lowercase;
    opacity:1; transition:opacity 1s;
  }
  #label {
    position:fixed; left:50%; top:50%; z-index:10;
    font-weight:200; font-size:clamp(9px,0.85vw,11px);
    letter-spacing:0.6em; color:rgba(240,238,232,0.22);
    white-space:nowrap; opacity:0; transition:opacity 3s ease;
    text-transform:lowercase; pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="vignette"></div>
<div id="hint">tap to begin</div>
<div id="label">formerly known as luxhiro</div>

<script>
// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('hint');
const label  = document.getElementById('label');
let W, H;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  const dpr = Math.min(devicePixelRatio||1,2);
  canvas.width  = W*dpr; canvas.height = H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
}
resize(); window.addEventListener('resize', resize);

// ── Audio ──
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playWhoosh(delay=0) {
  const ac = getAudio();
  setTimeout(() => {
    const buf = ac.createBuffer(1, ac.sampleRate*0.6, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length,1.5);
    const src  = ac.createBufferSource();
    src.buffer = buf;
    const filt = ac.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.setValueAtTime(800,ac.currentTime);
    filt.frequency.exponentialRampToValueAtTime(200,ac.currentTime+0.5);
    filt.Q.value=0.8;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.28,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.55);
    src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    src.start();
  }, delay);
}

function playPop(freq=440, delay=0) {
  const ac = getAudio();
  setTimeout(() => {
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(freq,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*0.4,ac.currentTime+0.12);
    gain.gain.setValueAtTime(0.18,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.14);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime+0.15);
  }, delay);
}

function playBounce(delay=0) {
  const ac = getAudio();
  setTimeout(() => {
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type='triangle';
    osc.frequency.setValueAtTime(300,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(120,ac.currentTime+0.08);
    gain.gain.setValueAtTime(0.1,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime+0.12);
  }, delay);
}

function playChime(delay=0) {
  const ac = getAudio();
  setTimeout(() => {
    [523,659,784,1047].forEach((f,i) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.type='sine';
      osc.frequency.value = f;
      const t = ac.currentTime + i*0.11;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.13,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,t+1.4);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(t); osc.stop(t+1.5);
    });
  }, delay);
}

function playLandThud(delay=0) {
  const ac = getAudio();
  setTimeout(() => {
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(180,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60,ac.currentTime+0.15);
    gain.gain.setValueAtTime(0.15,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.18);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime+0.2);
  }, delay);
}

// ── Letter class ──
class Letter {
  constructor(char, x, y, fontSize, color='#f0ede6') {
    this.char    = char;
    this.x       = x;   this.y = y;
    this.tx      = x;   this.ty = y;  // target
    this.vx      = 0;   this.vy = 0;
    this.angle   = 0;
    this.va      = 0;   // angular velocity
    this.scale   = 1;
    this.alpha   = 1;
    this.fontSize= fontSize;
    this.color   = color;
    this.mode    = 'static'; // static | fly | home
    this.bounces = 0;
    this.wobble  = 0;
    this.wobbleSpeed = 0.08 + Math.random()*0.06;
    this.landed  = false;
  }

  launch() {
    this.mode = 'fly';
    // Random chaotic velocity
    const ang = -Math.PI*0.8 + (Math.random()-0.5)*Math.PI*1.8;
    const spd = 6 + Math.random()*18;
    this.vx = Math.cos(ang)*spd;
    this.vy = Math.sin(ang)*spd - 4;
    this.va = (Math.random()-0.5)*0.35; // spin
    this.bounces = 0;
  }

  goHome(tx, ty) {
    this.tx   = tx; this.ty = ty;
    this.mode = 'home';
    this.landed = false;
  }

  update(t) {
    this.wobble += this.wobbleSpeed;

    if (this.mode === 'fly') {
      this.vy  += 0.38;          // gravity
      this.vx  *= 0.992;
      this.x   += this.vx;
      this.y   += this.vy;
      this.angle += this.va;
      this.va  *= 0.995;

      // Bounce off walls
      const pad = this.fontSize * 0.6;
      if (this.x < pad) {
        this.x = pad; this.vx = Math.abs(this.vx)*0.72;
        this.va = (Math.random()-0.5)*0.25;
        this.bounces++; playBounce(0);
      }
      if (this.x > W-pad) {
        this.x = W-pad; this.vx = -Math.abs(this.vx)*0.72;
        this.va = (Math.random()-0.5)*0.25;
        this.bounces++; playBounce(0);
      }
      if (this.y > H + pad*3) {
        // Wrap from top
        this.y = -pad; this.vy *= -0.5;
      }
      if (this.y < -pad*4) {
        this.vy = Math.abs(this.vy);
      }

    } else if (this.mode === 'home') {
      const dx = this.tx - this.x;
      const dy = this.ty - this.y;
      const dist = Math.sqrt(dx*dx+dy*dy);

      // Elastic spring
      const k = 0.09;
      this.vx += dx*k; this.vy += dy*k;
      this.vx *= 0.78; this.vy *= 0.78;
      this.x  += this.vx; this.y += this.vy;

      // Snap angle back to 0
      this.angle  += (0 - this.angle)*0.12;
      this.va     *= 0.78;

      if (dist < 1.5 && !this.landed) {
        this.landed = true;
        this.x = this.tx; this.y = this.ty;
        playLandThud(0);
      }
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    // Slight wobble scale when flying
    const ws = this.mode==='fly' ? 1 + Math.sin(this.wobble)*0.06 : 1;
    ctx.scale(ws, ws);
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
    ctx.fillStyle   = this.color;
    ctx.font        = `200 ${this.fontSize}px 'Raleway', sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

// ── Measure text helper ──
function measureWord(word, fontSize) {
  ctx.font = `200 ${fontSize}px 'Raleway', sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  return ctx.measureText(word).width;
}

function getLetterPositions(word, cx, cy, fontSize) {
  ctx.font = `200 ${fontSize}px 'Raleway', sans-serif`;
  ctx.textAlign='left'; ctx.textBaseline='middle';
  const positions = [];
  let cursor = cx - ctx.measureText(word).width/2;
  for (const ch of word) {
    const w = ctx.measureText(ch).width;
    positions.push({ x: cursor + w/2, y: cy });
    cursor += w;
  }
  return positions;
}

// ── Main ──
let letters   = [];
let state     = 'waiting'; // waiting | show | fly | gather | done
let elapsed   = 0;
let lastTime  = null;
let labelDone = false;
let started   = false;
let raf;

const FONT_SIZE = Math.min(W*0.115, 150);

function buildLuxhiro() {
  const word = 'luxhiro';
  const cy   = H/2;
  const positions = getLetterPositions(word, W/2, cy, FONT_SIZE);
  letters = positions.map((p, i) => new Letter(word[i], p.x, p.y, FONT_SIZE));
  // Start invisible, fade in
  letters.forEach(l => l.alpha = 0);
}

function scatterAll() {
  playWhoosh(0);
  letters.forEach((l, i) => {
    setTimeout(() => { l.launch(); playPop(300+i*80, 0); }, i * 55);
  });
}

function getAlleTargets() {
  const word = 'alle';
  // alle is shorter — use same font size or slightly bigger
  const fs   = FONT_SIZE * 1.08;
  return { positions: getLetterPositions(word, W/2, H/2, fs), fs };
}

function gatherToAlle() {
  playWhoosh(0);
  const { positions, fs } = getAlleTargets();

  // Map luxhiro letters (7) → alle letters (4)
  // Some letters disappear, some become new letters
  const alleChars = 'alle';
  const mappings  = [
    // [luxhiro_index, alle_index_or_null]
    [0, 0], // l → a  (transform)
    [1, 1], // u → l
    [2, 2], // x → l
    [3, 3], // h → e
    [4, null], // i disappears
    [5, null], // r disappears
    [6, null], // o disappears
  ];

  mappings.forEach(([li, ai], idx) => {
    const ltr = letters[li];
    setTimeout(() => {
      if (ai !== null) {
        ltr.char = alleChars[ai];
        ltr.fontSize = fs;
        ltr.goHome(positions[ai].x, positions[ai].y);
      } else {
        // fly off screen dramatically
        ltr.mode = 'fly';
        ltr.vx = (Math.random()-0.5)*12;
        ltr.vy = -15 - Math.random()*10;
        ltr.va = (Math.random()-0.5)*0.4;
        // fade out
        const fadeStart = performance.now();
        function fadeOut() {
          const elapsed = (performance.now()-fadeStart)/1000;
          ltr.alpha = Math.max(0, 1 - elapsed*1.4);
          if (ltr.alpha > 0) requestAnimationFrame(fadeOut);
          else ltr.alpha = 0;
        }
        fadeOut();
      }
      playPop(350 - ai*40 || 180, 0);
    }, idx * 90);
  });
}

// ── Render loop ──
function loop(now) {
  raf = requestAnimationFrame(loop);
  const dt = lastTime ? Math.min((now-lastTime)/1000, 0.05) : 0;
  lastTime = now; elapsed += dt;

  ctx.fillStyle = 'rgba(8,8,8,1)';
  ctx.fillRect(0,0,W,H);

  // Fade in luxhiro letters
  if (state === 'show') {
    letters.forEach(l => {
      if (l.alpha < 0.9) l.alpha = Math.min(0.9, l.alpha + dt*1.2);
    });
    if (elapsed > 1.6) {
      state = 'fly';
      scatterAll();
    }
  }

  if (state === 'fly') {
    if (elapsed > 4.2) {
      state = 'gather';
      elapsed = 0;
      gatherToAlle();
    }
  }

  if (state === 'gather') {
    if (elapsed > 2.8 && !labelDone) {
      labelDone = true;
      const fs = FONT_SIZE * 1.08;
      label.style.transform = `translate(-50%, ${fs*0.82}px)`;
      label.style.opacity = '1';
      playChime(400);
    }
  }

  // Update + draw
  letters.forEach(l => { l.update(elapsed); l.draw(); });

  ctx.globalAlpha = 1;
}

// ── Start on tap/click ──
function start() {
  if (started) return;
  started = true;
  hint.style.opacity = '0';
  setTimeout(() => hint.style.display='none', 1000);

  getAudio(); // unlock audio context

  elapsed  = 0;
  lastTime = null;
  state    = 'show';

  buildLuxhiro();
  requestAnimationFrame(loop);
}

document.addEventListener('click',      start, {once:true});
document.addEventListener('touchstart', start, {once:true, passive:true});

// Draw idle state before start
(function idleLoop(now) {
  if (started) return;
  requestAnimationFrame(idleLoop);
  ctx.fillStyle='#080808';
  ctx.fillRect(0,0,W,H);
  // dim preview of luxhiro
  ctx.globalAlpha = 0.12;
  ctx.fillStyle   = '#f0ede6';
  ctx.font        = `200 ${Math.min(W*0.115,150)}px 'Raleway', sans-serif`;
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'middle';
  ctx.fillText('luxhiro', W/2, H/2);
  ctx.globalAlpha = 1;
})();
</script>
</body>
</html>
