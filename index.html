<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alle</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#080808;}
  canvas{position:fixed;inset:0;}
  #hint{
    position:fixed;bottom:38px;left:50%;transform:translateX(-50%);
    font-family:'Raleway',sans-serif;font-weight:200;font-size:10px;
    letter-spacing:.6em;color:rgba(255,255,255,.2);text-transform:lowercase;
    z-index:20;cursor:pointer;animation:pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.1;}60%{opacity:.65;}}
  #label{
    position:fixed;left:50%;z-index:15;pointer-events:none;
    font-family:'Raleway',sans-serif;font-weight:200;
    font-size:clamp(8px,.75vw,10px);letter-spacing:.7em;
    color:rgba(235,232,228,.15);white-space:nowrap;
    opacity:0;transition:opacity 6s ease;text-transform:lowercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">tap to begin</div>
<div id="label">formerly known as luxhiro</div>
<script>
// ═══════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════
const CV=document.getElementById('c');
const cx=CV.getContext('2d');
const hint=document.getElementById('hint');
const label=document.getElementById('label');
let W,H,DPR;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  DPR=Math.min(devicePixelRatio||1,2);
  CV.width=W*DPR;CV.height=H*DPR;
  CV.style.width=W+'px';CV.style.height=H+'px';
  cx.setTransform(1,0,0,1,0,0);cx.scale(DPR,DPR);
}
resize();window.addEventListener('resize',resize);

// ═══════════════════════════════════════
// MATH HELPERS
// ═══════════════════════════════════════
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const ease3=(t)=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const easeOut=(t)=>1-Math.pow(1-t,3);
const easeIn=(t)=>t*t*t;

// ═══════════════════════════════════════
// COLORS
// ═══════════════════════════════════════
const LCOLORS=['#FF6B8A','#FFB347','#FFE566','#7DD87D','#6EC6F5','#B388FF','#FF8FAB'];
const ALLE_C='#f0ede6';
let drain=0,drainTarget=0;

function blendToWhite(hex,t){
  if(t>=1)return ALLE_C;if(t<=0)return hex;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const grey=.299*r+.587*g+.114*b;
  const mr=r+(grey-r)*t,mg=g+(grey-g)*t,mb=b+(grey-b)*t;
  return`rgb(${Math.round(lerp(mr,240,t*.5))},${Math.round(lerp(mg,237,t*.5))},${Math.round(lerp(mb,230,t*.5))})`;
}

// ═══════════════════════════════════════
// SCREEN SHAKE
// ═══════════════════════════════════════
let sX=0,sY=0,sMag=0;
function shk(m){sMag=Math.max(sMag,m);}
function updShk(){
  if(sMag>.25){sX=(Math.random()-.5)*sMag*2;sY=(Math.random()-.5)*sMag*2;sMag*=.78;}
  else{sX=0;sY=0;sMag=0;}
}

// ═══════════════════════════════════════
// ATMOSPHERE — ambient dust always alive
// ═══════════════════════════════════════
const dust=[];
let dustColor='rgba(180,170,155,'; // changes with stage
let dustIntensity=0; // 0-1

function initDust(){
  for(let i=0;i<120;i++){
    dust.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.25,vy:-.05-Math.random()*.2,
      sz:.4+Math.random()*1.4,
      life:Math.random(),decay:.0008+Math.random()*.002,
      alpha:Math.random()*.35,
    });
  }
}

function updateDust(dt,t){
  // Continuously respawn
  while(dust.length<120){
    dust.push({
      x:Math.random()*W,y:H+10,
      vx:(Math.random()-.5)*.3,vy:-.08-Math.random()*.25,
      sz:.3+Math.random()*1.6,life:0,decay:.0005+Math.random()*.0018,alpha:0
    });
  }
  for(let i=dust.length-1;i>=0;i--){
    const d=dust[i];
    d.x+=d.vx+Math.sin(t*.4+d.x*.01)*.08;
    d.y+=d.vy;d.life+=d.decay;
    d.alpha=Math.sin(d.life*Math.PI)*(dustIntensity*.4+.05);
    if(d.life>=1)dust.splice(i,1);
  }
}

function drawDust(){
  for(const d of dust){
    if(d.alpha<.005)continue;
    cx.globalAlpha=d.alpha;
    cx.fillStyle=dustColor+'1)';
    cx.beginPath();cx.arc(d.x+sX,d.y+sY,d.sz,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;
}

// ═══════════════════════════════════════
// EMBERS — fall after explosion (colored)
// ═══════════════════════════════════════
const embers=[];
function spawnEmbers(x,y,n,col){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2,spd=.5+Math.random()*4;
    embers.push({x,y,tx:x+(Math.random()-.5)*W*.8,ty:H+50,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,
      col,sz:.8+Math.random()*2.2,life:1,
      decay:.004+Math.random()*.008,spin:Math.random()*Math.PI*2,spinV:(Math.random()-.5)*.08});
  }
}
function updateEmbers(dt){
  for(let i=embers.length-1;i>=0;i--){
    const e=embers[i];
    e.vx*=.992;e.vy+=.06;e.vy*=.992;
    e.x+=e.vx;e.y+=e.vy;e.spin+=e.spinV;e.life-=e.decay;
    if(e.life<=0||e.y>H+60)embers.splice(i,1);
  }
}
function drawEmbers(){
  for(const e of embers){
    cx.save();cx.translate(e.x+sX,e.y+sY);cx.rotate(e.spin);
    cx.globalAlpha=e.life*e.life*.8;cx.fillStyle=e.col;
    cx.fillRect(-e.sz/2,-e.sz/2,e.sz,e.sz*.4);
    cx.restore();
  }cx.globalAlpha=1;
}

// ═══════════════════════════════════════
// SPARKS — bright burst
// ═══════════════════════════════════════
const sparks=[];
function spark(x,y,n,col){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2,spd=1+Math.random()*7;
    sparks.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1.5,
      col,sz:.5+Math.random()*2,life:1,decay:.025+Math.random()*.04});
  }
}
function updateSparks(){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx;s.y+=s.vy;s.vy+=.13;s.vx*=.97;s.vy*=.97;s.life-=s.decay;
    if(s.life<=0)sparks.splice(i,1);
  }
}
function drawSparks(){
  for(const s of sparks){
    cx.globalAlpha=s.life*s.life;cx.fillStyle=s.col;
    cx.beginPath();cx.arc(s.x+sX,s.y+sY,s.sz*s.life,0,Math.PI*2);cx.fill();
  }cx.globalAlpha=1;
}

// ═══════════════════════════════════════
// SHOCKWAVE
// ═══════════════════════════════════════
const waves=[];
function shockwave(x,y){
  waves.push({x,y,r:0,maxR:Math.max(W,H)*.7,life:1,decay:.018});
}
function updateWaves(){
  for(let i=waves.length-1;i>=0;i--){
    const w=waves[i];w.r=lerp(0,w.maxR,1-w.life);w.life-=w.decay;
    if(w.life<=0)waves.splice(i,1);
  }
}
function drawWaves(){
  for(const w of waves){
    cx.save();cx.globalAlpha=w.life*.35;
    cx.strokeStyle='rgba(255,255,255,.9)';
    cx.lineWidth=2.5*(w.life*.8+.2);
    cx.beginPath();cx.arc(w.x+sX,w.y+sY,w.r,0,Math.PI*2);cx.stroke();
    cx.restore();
  }
}

// ═══════════════════════════════════════
// GLOW BLOOM — center warm light
// ═══════════════════════════════════════
let bloomAmt=0,bloomTarget=0,bloomCol='rgba(240,220,180,';
function drawBloom(){
  if(bloomAmt<.01)return;
  const rad=H*.55;
  const g=cx.createRadialGradient(W/2+sX,H/2+sY,0,W/2+sX,H/2+sY,rad);
  g.addColorStop(0,bloomCol+(.12*bloomAmt)+')');
  g.addColorStop(.4,bloomCol+(.05*bloomAmt)+')');
  g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
let ac;
const A=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;};

function noise(dur){
  const a=A(),buf=a.createBuffer(2,a.sampleRate*dur,a.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);}
  return buf;
}

function playPluck(f,v=.14,del=0){
  const a=A();setTimeout(()=>{
    const t=a.currentTime,o=a.createOscillator(),g=a.createGain();
    o.type='triangle';o.frequency.setValueAtTime(f*1.04,t);o.frequency.exponentialRampToValueAtTime(f*.97,t+.1);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.012);g.gain.exponentialRampToValueAtTime(.001,t+.7);
    const fl=a.createBiquadFilter();fl.type='lowpass';fl.frequency.value=1100;
    o.connect(fl);fl.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.75);
  },del);
}
function playChord(){[[261,0],[329,60],[392,120],[523,195],[659,280]].forEach(([f,d])=>playPluck(f,.12,d));}

let tickTO=null;
function startTicks(){
  let spd=280;
  (function tick(){
    const a=A(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
    o.type='square';o.frequency.value=1000+Math.random()*600;
    g.gain.setValueAtTime(.028,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.05);
    spd=Math.max(42,spd*.9);tickTO=setTimeout(tick,spd);
  })();
}
function stopTicks(){clearTimeout(tickTO);}

let rSrc=null,rGain=null;
function startRumble(){
  const a=A();rGain=a.createGain();rGain.gain.value=0;
  const src=a.createBufferSource();src.buffer=noise(3);src.loop=true;
  const fl=a.createBiquadFilter();fl.type='lowpass';fl.frequency.value=80;
  src.connect(fl);fl.connect(rGain);rGain.connect(a.destination);src.start();rSrc=src;
  rGain.gain.linearRampToValueAtTime(.22,a.currentTime+4);
}
function stopRumble(){
  if(!rGain)return;rGain.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.35);
  setTimeout(()=>{try{rSrc.stop();}catch(e){}},500);
}

function playZap(v=.1){
  const a=A(),t=a.currentTime;
  const src=a.createBufferSource();src.buffer=noise(.07);
  const fl=a.createBiquadFilter();fl.type='bandpass';fl.frequency.value=2500+Math.random()*2200;fl.Q.value=4;
  const g=a.createGain();g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);
  src.connect(fl);fl.connect(g);g.connect(a.destination);src.start();
}

function playScream(){
  const a=A(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(160,t);o.frequency.linearRampToValueAtTime(920,t+.28);o.frequency.linearRampToValueAtTime(80,t+.55);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.22,t+.06);g.gain.exponentialRampToValueAtTime(.001,t+.6);
  const fl=a.createBiquadFilter();fl.type='bandpass';fl.frequency.value=500;fl.Q.value=2;
  o.connect(fl);fl.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.65);
}

function playBoom(){
  const a=A(),t=a.currentTime;
  // Sub bass
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(95,t);o.frequency.exponentialRampToValueAtTime(18,t+.9);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.9,t+.006);g.gain.exponentialRampToValueAtTime(.001,t+.95);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+1);
  // Crack
  const src=a.createBufferSource();src.buffer=noise(.06);
  const fl=a.createBiquadFilter();fl.type='highpass';fl.frequency.value=3000;
  const ng=a.createGain();ng.gain.setValueAtTime(.4,t);ng.gain.exponentialRampToValueAtTime(.001,t+.06);
  src.connect(fl);fl.connect(ng);ng.connect(a.destination);src.start();
  // Body
  const src2=a.createBufferSource();src2.buffer=noise(.55);
  const fl2=a.createBiquadFilter();fl2.type='lowpass';fl2.frequency.value=2800;
  const ng2=a.createGain();ng2.gain.setValueAtTime(.55,t);ng2.gain.exponentialRampToValueAtTime(.001,t+.5);
  src2.connect(fl2);fl2.connect(ng2);ng2.connect(a.destination);src2.start();
}

function playBoing(p=1){
  const a=A(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(250*p,t);o.frequency.exponentialRampToValueAtTime(65*p,t+.22);
  g.gain.setValueAtTime(.11,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.28);
}

// Lonely pad — long sustain after explosion
let lonelyOscs=[];
function playLonely(){
  const a=A(),t=a.currentTime;
  [[110,0],[138.6,.8],[164.8,1.6]].forEach(([f,delay])=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=f;
    // Slow detune wobble
    const lfo=a.createOscillator();lfo.type='sine';lfo.frequency.value=.18+Math.random()*.08;
    const lfoG=a.createGain();lfoG.gain.value=.8;lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start();
    const ct=t+delay;
    g.gain.setValueAtTime(0,ct);g.gain.linearRampToValueAtTime(.06,ct+2);
    g.gain.linearRampToValueAtTime(.04,ct+5);g.gain.exponentialRampToValueAtTime(.001,ct+8);
    const fl=a.createBiquadFilter();fl.type='lowpass';fl.frequency.value=600;
    o.connect(fl);fl.connect(g);g.connect(a.destination);o.start(ct);
    lonelyOscs.push(o,lfo);
  });
  // Distant high shimmer — emptiness
  const oh=a.createOscillator(),gh=a.createGain();
  oh.type='sine';oh.frequency.value=880;
  gh.gain.setValueAtTime(0,t+1.5);gh.gain.linearRampToValueAtTime(.022,t+3);
  gh.gain.linearRampToValueAtTime(.015,t+7);gh.gain.exponentialRampToValueAtTime(.001,t+9);
  oh.connect(gh);gh.connect(a.destination);oh.start(t+1.5);lonelyOscs.push(oh);
}
function stopLonely(){lonelyOscs.forEach(o=>{try{o.stop();}catch(e){}});lonelyOscs=[];}

// Hesitate blip
function playHesBlip(p=1){
  const a=A(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type='triangle';o.frequency.setValueAtTime(200*p,t);o.frequency.linearRampToValueAtTime(160*p,t+.18);
  g.gain.setValueAtTime(.055,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.25);
}

// Rising breath — each letter's moment
function playBreath(i){
  const a=A(),t=a.currentTime;
  const src=a.createBufferSource();
  const buf=a.createBuffer(1,a.sampleRate*.8,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.pow(Math.sin(j/d.length*Math.PI),.5);
  src.buffer=buf;
  const fl=a.createBiquadFilter();fl.type='bandpass';fl.frequency.value=600+i*120;fl.Q.value=1.5;
  const g=a.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.09,t+.2);g.gain.exponentialRampToValueAtTime(.001,t+.75);
  src.connect(fl);fl.connect(g);g.connect(a.destination);src.start();
}

// Letter lands home
function playLand(i){
  const a=A(),t=a.currentTime;
  const freqs=[220,261,294,349];
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(freqs[i]*1.4,t);o.frequency.exponentialRampToValueAtTime(freqs[i],t+.12);
  g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.22);
}

// Alle final — warm resolution, earned silence
function playAlleReveal(){
  const a=A(),t=a.currentTime;
  stopLonely();
  // Warm resolving chord
  [[196,0,.1],[246,.18,.085],[294,.36,.07],[392,.56,.055]].forEach(([f,d,v])=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=f;
    // Slight vibrato
    const lfo=a.createOscillator();lfo.type='sine';lfo.frequency.value=4.5;
    const lg=a.createGain();lg.gain.value=1.2;lfo.connect(lg);lg.connect(o.frequency);lfo.start();
    const ct=t+d;
    g.gain.setValueAtTime(0,ct);g.gain.linearRampToValueAtTime(v,ct+.25);
    g.gain.linearRampToValueAtTime(v*.6,ct+2.5);g.gain.exponentialRampToValueAtTime(.001,ct+5.5);
    const fl=a.createBiquadFilter();fl.type='lowpass';fl.frequency.value=1400;
    o.connect(fl);fl.connect(g);g.connect(a.destination);o.start(ct);o.stop(ct+6);
    lfo.stop(ct+6);
  });
  // Single exhale — like relief
  const src=a.createBufferSource();src.buffer=noise(1.2);
  const fl=a.createBiquadFilter();fl.type='bandpass';fl.frequency.value=350;fl.Q.value=1;
  const g=a.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.07,t+.3);g.gain.exponentialRampToValueAtTime(.001,t+1.5);
  src.connect(fl);fl.connect(g);g.connect(a.destination);src.start();
  // Soft high crystal — the new beginning
  setTimeout(()=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=1318;
    g.gain.setValueAtTime(0,a.currentTime);g.gain.linearRampToValueAtTime(.05,a.currentTime+.3);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+3.5);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+4);
  },800);
}

// ═══════════════════════════════════════
// LETTER CLASS — with weight & soul
// ═══════════════════════════════════════
class Letter{
  constructor(ch,x,y,fs,col){
    this.ch=ch;this.ox=x;this.oy=y;
    this.x=x;this.y=y;this.tx=x;this.ty=y;
    this.vx=0;this.vy=0;this.angle=0;this.va=0;
    this.alpha=0;this.targetAlpha=.92;this.fs=fs;
    this.col=col;this.dcol=col;
    this.mode='idle';
    this.phi=Math.random()*Math.PI*2;
    this.nOff=(Math.random()-.5)*.5;
    this.nerv=0;this.glitch=0;
    this.trail=[];this.maxTrail=14;
    this.sqX=1;this.sqY=1;
    this.locked=false;
    this.orbitA=0;this.orbitR=0;this.orbitSpd=0;
    this.droop=0;this.droopV=0;
    // Hesitate state
    this.hesTimer=0;this.hesMax=2.5;this.pullS=.5;
    // Rise delay per letter
    this.riseDelay=0;this.riseReady=false;
    // Glow pulse
    this.glowPulse=0;
  }

  get drawX(){return this.x+sX;}
  get drawY(){return this.y+sY+this.droop;}

  draw(t,dr){
    this.dcol=blendToWhite(this.col,dr);

    // Trail — longer and more visible
    const tm=this.mode==='fly'||this.mode==='orbit'||this.mode==='drift';
    if(tm&&this.trail.length>1){
      for(let i=0;i<this.trail.length;i++){
        const tr=this.trail[i],f=i/this.trail.length;
        cx.save();cx.translate(tr.x+sX,tr.y+sY);
        cx.globalAlpha=f*f*.22*this.alpha;
        cx.fillStyle=this.dcol;
        cx.font=`200 ${this.fs*.85}px 'Raleway',sans-serif`;
        cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(this.ch,0,0);cx.restore();
      }
    }

    cx.save();
    // Per-letter nervousness
    const nx=this.nerv>0?(Math.random()-.5)*this.nerv:0;
    const ny=this.nerv>0?(Math.random()-.5)*this.nerv:0;
    cx.translate(this.drawX+nx,this.drawY+ny);
    cx.rotate(this.angle);cx.scale(this.sqX,this.sqY);

    // Glitch ghost
    if(this.glitch>.07){
      cx.save();cx.globalAlpha=this.alpha*this.glitch*.55;cx.fillStyle=this.dcol;
      cx.font=`200 ${this.fs}px 'Raleway',sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(this.ch,(Math.random()-.5)*this.glitch*20,(Math.random()-.5)*this.glitch*8);
      cx.restore();
      cx.save();cx.globalAlpha=this.alpha*this.glitch*.3;cx.fillStyle='rgba(255,255,255,.8)';
      cx.font=`200 ${this.fs}px 'Raleway',sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(this.ch,(Math.random()-.5)*this.glitch*14,0);cx.restore();
    }

    // Glow — reactive to emotion
    const gAmt=this.mode==='idle'?.6:
               this.mode==='drift'?.25:
               this.mode==='hesitate'?.4+Math.sin(t*3+this.phi)*.2:
               this.mode==='droop'?.5:
               this.mode==='home'||this.mode==='locked'?.8+this.glowPulse*.3:
               .35;
    const gCol=dr>.6?`rgba(220,215,205,${.5*gAmt})`:`${this.dcol}${Math.round(gAmt*80).toString(16).padStart(2,'0')}`;
    cx.shadowColor=gCol;cx.shadowBlur=18*gAmt+this.glitch*25;
    cx.globalAlpha=clamp(this.alpha,0,1);cx.fillStyle=this.dcol;
    cx.font=`200 ${this.fs}px 'Raleway',sans-serif`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(this.ch,0,0);
    cx.shadowBlur=0;cx.restore();
  }

  update(dt,t,gNerv,gGlitch){
    this.sqX=lerp(this.sqX,1,.16);this.sqY=lerp(this.sqY,1,.16);
    this.alpha=lerp(this.alpha,this.targetAlpha,.06);
    this.nerv=gNerv*(.7+.6*Math.abs(Math.sin(t*2+this.phi+this.nOff)));
    this.glitch=gGlitch*(.4+.9*Math.abs(Math.sin(t*3.8+this.phi)));

    if(this.mode==='idle'){
      this.targetAlpha=.92;
      this.y=lerp(this.y,this.oy+Math.sin(t*1.1+this.phi)*3,.04);

    }else if(this.mode==='fly'){
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>this.maxTrail)this.trail.shift();
      this.vy+=.44;this.vx*=.991;this.vy*=.991;
      this.x+=this.vx;this.y+=this.vy;
      this.angle+=this.va;this.va*=.997;
      const pad=this.fs*.5;
      if(this.x<pad){this.x=pad;this.vx=Math.abs(this.vx)*(.5+Math.random()*.3);this.va=(Math.random()-.5)*.5;this.sqX=.52;this.sqY=1.5;spark(this.x,this.y,8,this.dcol);playBoing(.7+Math.random()*.7);}
      if(this.x>W-pad){this.x=W-pad;this.vx=-Math.abs(this.vx)*(.5+Math.random()*.3);this.va=(Math.random()-.5)*.5;this.sqX=.52;this.sqY=1.5;spark(this.x,this.y,8,this.dcol);playBoing(.7+Math.random()*.7);}
      if(this.y>H+pad*4){this.y=-pad*2;this.vy*=-.35;}
      if(this.y<-pad*6){this.vy=Math.abs(this.vy)*.4;}

    }else if(this.mode==='orbit'){
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>10)this.trail.shift();
      this.orbitA+=this.orbitSpd;this.orbitR*=.975;
      this.x=W/2+Math.cos(this.orbitA)*this.orbitR;
      this.y=H/2+Math.sin(this.orbitA)*this.orbitR;
      this.angle+=.04;this.targetAlpha=.75;

    }else if(this.mode==='drift'){
      // Lost. Barely moving. Gravity of emptiness.
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>7)this.trail.shift();
      this.vx*=.984;this.vy*=.984;
      // Very slow pull toward center — like being stuck
      this.vx+=(W/2-this.x)*.0004;this.vy+=(H/2-this.y)*.0004;
      // Organic drift with slow sine
      this.vx+=Math.sin(t*.35+this.phi)*.012;this.vy+=Math.cos(t*.28+this.phi)*.012;
      this.x+=this.vx;this.y+=this.vy;
      this.angle=lerp(this.angle,0,.01);
      this.targetAlpha=.38+Math.sin(t*.6+this.phi)*.08;

    }else if(this.mode==='hesitate'){
      this.hesTimer+=dt;
      const dx=this.tx-this.x,dy=this.ty-this.y;
      // Oscillate between wanting to go and pulling back
      const desire=Math.pow(Math.max(0,Math.sin(this.hesTimer*1.1)),2);
      this.vx+=dx*.018*desire*this.pullS;this.vy+=dy*.018*desire*this.pullS;
      this.vx*=.86;this.vy*=.86;
      this.x+=this.vx;this.y+=this.vy;
      this.angle=lerp(this.angle,0,.06);
      this.targetAlpha=.45+desire*.35;
      // Blip sounds on approach pulses
      if(Math.sin(this.hesTimer*1.1)>.9&&Math.sin((this.hesTimer-dt)*1.1)<=.9)
        playHesBlip(.8+Math.random()*.4);

    }else if(this.mode==='droop'){
      // Gravity of past mistakes — sag first, then rise
      this.droopV+=12*dt; // sag down
      this.droop+=this.droopV*dt;
      const maxDroop=H*.06;
      if(this.droop>=maxDroop){
        this.droop=maxDroop;this.droopV=0;
        // Now rise — mode shifts to home after a pause
        setTimeout(()=>{
          this.droopV=0;
          // Animate droop back to 0 in update loop
          this.mode='drooprise';
        },600);
      }
      this.targetAlpha=lerp(.45,.85,clamp(this.droop/maxDroop,0,1));

    }else if(this.mode==='drooprise'){
      this.droop=lerp(this.droop,0,.05);
      // Also drift toward target
      const dx=this.tx-this.x,dy=this.ty-this.y;
      this.vx+=dx*.055;this.vy+=dy*.055;this.vx*=.8;this.vy*=.8;
      this.x+=this.vx;this.y+=this.vy;
      this.angle=lerp(this.angle,0,.1);
      this.targetAlpha=.85;
      if(this.droop<1){this.droop=0;this.mode='home';}

    }else if(this.mode==='home'){
      this.droop=lerp(this.droop,0,.1);
      const dx=this.tx-this.x,dy=this.ty-this.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      this.vx+=dx*.1;this.vy+=dy*.1;this.vx*=.78;this.vy*=.78;
      this.x+=this.vx;this.y+=this.vy;
      this.angle=lerp(this.angle,0,.12);
      this.targetAlpha=.95;
      if(dist<1.8&&!this.locked){
        this.locked=true;this.mode='locked';
        this.x=this.tx;this.y=this.ty;this.droop=0;
        this.sqX=1.28;this.sqY=.74;
        spark(this.x,this.y,12,ALLE_C);
        return'locked';
      }

    }else if(this.mode==='locked'){
      this.droop=0;
      this.angle=lerp(this.angle,0,.16);
      this.glowPulse=Math.sin(t*.55+this.phi)*.5+.5;
      this.targetAlpha=.95+this.glowPulse*.05;
    }
    return null;
  }
}

// ═══════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════
function getPos(word,fs,cy){
  cx.font=`200 ${fs}px 'Raleway',sans-serif`;cx.textAlign='left';cx.textBaseline='middle';
  let cur=W/2-cx.measureText(word).width/2;
  return[...word].map(ch=>{const w=cx.measureText(ch).width;const p={x:cur+w/2,y:cy};cur+=w;return p;});
}

// ═══════════════════════════════════════
// STAGE MACHINE
// ═══════════════════════════════════════
const ST={WAIT:0,SHOW:1,NERV:2,GLITCH:3,STRUGGLE:4,BREAK:5,DRIFT:6,HESITATE:7,DROOP:8,RISE:9,DONE:10};
let letters=[],stage=ST.WAIT,stageT=0,gT=0,lastNow=null;
let gNerv=0,gGlitch=0,locks=0,started=false;
const strPos=[];

const FS=()=>Math.min(W*.114,150);

function build(){
  const fs=FS(),pos=getPos('luxhiro',fs,H/2);
  letters=pos.map((p,i)=>new Letter('luxhiro'[i],p.x,p.y,fs,LCOLORS[i]));
}
function go(s){stage=s;stageT=0;}

function doStruggle(){
  go(ST.STRUGGLE);playScream();shk(6);drainTarget=.5;
  letters.forEach((l,i)=>{strPos[i]={ox:l.x,oy:l.y};l.vx=(Math.random()-.5)*32;l.vy=(Math.random()-.5)*28-6;});
}
function doBreak(){
  go(ST.BREAK);stopTicks();stopRumble();
  playBoom();shk(28);drainTarget=.78;
  shockwave(W/2,H/2);
  letters.forEach(l=>{spawnEmbers(l.x,l.y,18,l.dcol);spark(l.x,l.y,10,l.dcol);});
  spark(W/2,H/2,22,'rgba(255,255,255,.9)');
  letters.forEach((l,i)=>{
    l.mode='fly';const ang=-Math.PI*.5+(Math.random()-.5)*Math.PI*2.5,spd=14+Math.random()*24;
    l.vx=Math.cos(ang)*spd;l.vy=Math.sin(ang)*spd-5;l.va=(Math.random()-.5)*.6;
    setTimeout(()=>{dustIntensity=.6;dustColor='rgba('+LCOLORS[i].slice(1).match(/../g).map(h=>parseInt(h,16)).join(',')+',.4)';},i*80);
    setTimeout(()=>playBoing(.5+Math.random()*.8),80+i*40);
  });
  bloomTarget=0;
}

function doDrift(){
  go(ST.DRIFT);drainTarget=.88;dustIntensity=.5;
  dustColor='rgba(160,148,130,';
  bloomTarget=0;bloomAmt=0;
  setTimeout(()=>playLonely(),300);
  letters.forEach(l=>{
    l.mode='drift';l.vx=(Math.random()-.5)*1.8;l.vy=(Math.random()-.5)*1.8;
    l.va=(Math.random()-.5)*.015;
  });
}

function doHesitate(){
  go(ST.HESITATE);
  const fs=FS()*1.08,pos=getPos('alle',fs,H/2);
  'alle'.split('').forEach((ch,ai)=>{
    const l=letters[ai];
    l.ch=ch;l.fs=fs;l.tx=pos[ai].x;l.ty=pos[ai].y;
    l.mode='hesitate';l.hesTimer=0;l.hesMax=2+ai*.5;l.pullS=.5+Math.random()*.5;l.locked=false;
  });
  [4,5,6].forEach((li,idx)=>{
    const l=letters[li];
    setTimeout(()=>{
      l.mode='fly';l.vy=-18-Math.random()*10;l.vx=(Math.random()-.5)*12;l.va=(Math.random()-.5)*.5;
      const fd=()=>{l.targetAlpha=Math.max(0,l.targetAlpha-.015);if(l.targetAlpha>0)requestAnimationFrame(fd);};
      setTimeout(fd,300+idx*200);
    },idx*140);
  });
  bloomTarget=.12;
}

function doDropAndRise(){
  go(ST.DROOP);drainTarget=1;
  bloomTarget=.25;bloomCol='rgba(200,185,160,';
  const delays=[0,350,640,900];
  locks=0;
  letters.slice(0,4).forEach((l,i)=>{
    setTimeout(()=>{
      l.mode='droop';l.droopV=0;l.droop=0;
      playBreath(i);
    },delays[i]);
  });
  label.style.top='50%';
  label.style.transform=`translate(-50%,${FS()*1.08*.9}px)`;
}

// ═══════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════
function loop(now){
  requestAnimationFrame(loop);
  const dt=lastNow?Math.min((now-lastNow)/1000,.05):0;
  lastNow=now;stageT+=dt;gT+=dt;

  drain=lerp(drain,drainTarget,dt*1.0);
  bloomAmt=lerp(bloomAmt,bloomTarget,dt*.6);
  dustIntensity=lerp(dustIntensity,
    stage===ST.DRIFT?.7:stage===ST.HESITATE?.4:stage===ST.DROOP||stage===ST.RISE?.25:.15,dt*.3);

  updShk();
  updateDust(dt,gT);
  updateEmbers(dt);
  updateSparks();
  updateWaves();

  // BG — deliberate trail blur in fly phases
  const bgFade=(stage===ST.BREAK)?.08:(stage===ST.DRIFT)?.04:1;
  cx.fillStyle=`rgba(8,8,8,${bgFade})`;cx.fillRect(0,0,W,H);

  drawBloom();

  // ── Stage logic ──
  if(stage===ST.SHOW&&stageT>1.8){go(ST.NERV);startRumble();startTicks();}
  if(stage===ST.NERV){const p=clamp(stageT/2.5,0,1);gNerv=p*p*15;gGlitch=0;if(stageT>2.5)go(ST.GLITCH);}
  if(stage===ST.GLITCH){
    const p=clamp(stageT/2,0,1);gNerv=15+p*10;gGlitch=p*p*.95;
    if(stageT%.2<dt)playZap(.07+p*.12);shk(p*3.5);if(stageT>2)doStruggle();
  }
  if(stage===ST.STRUGGLE){
    gNerv=24+Math.sin(gT*14)*6;gGlitch=.85+Math.sin(gT*9)*.15;
    letters.forEach((l,i)=>{
      if(!strPos[i])return;
      const dx=strPos[i].ox-l.x,dy=strPos[i].oy-l.y;
      l.vx+=dx*.065;l.vy+=dy*.065;l.vx*=.87;l.vy*=.87;l.x+=l.vx;l.y+=l.vy;l.nerv=24;
    });
    if(stageT%.1<dt)playZap(.16);shk(5);if(stageT>1.5)doBreak();
  }
  if(stage===ST.BREAK){gNerv=0;gGlitch=0;if(stageT>2.8)doDrift();}
  if(stage===ST.DRIFT){gNerv=0;gGlitch=0;if(stageT>4.5)doHesitate();}
  if(stage===ST.HESITATE){gNerv=0;gGlitch=0;if(stageT>4.8)doDropAndRise();}
  if(stage===ST.DROOP){
    const allHome=letters.slice(0,4).every(l=>l.mode==='locked'||l.mode==='home'||l.mode==='drooprise');
    if(stageT>4&&allHome)go(ST.RISE);
    else if(stageT>5.5)go(ST.RISE);
  }
  if(stage===ST.RISE&&stageT>4&&label.style.opacity!=='1'){label.style.opacity='1';}

  // ── Draw layers ──
  drawDust();
  drawEmbers();
  drawWaves();
  drawSparks();

  // ── Letters ──
  for(const l of letters){
    if(stage===ST.STRUGGLE){l.draw(gT,drain);continue;}
    const ev=l.update(dt,gT,gNerv,gGlitch);
    if(ev==='locked'){
      locks++;playLand(locks-1);
      bloomTarget=.15+locks*.12;
      if(locks===4){
        setTimeout(()=>{playAlleReveal();shk(5);bloomTarget=.65;bloomCol='rgba(220,205,175,';},100);
        go(ST.DONE);label.style.opacity='1';
      }
    }
    l.draw(gT,drain);
  }

  // Idle ghost
  if(stage===ST.WAIT){
    cx.globalAlpha=.06;cx.fillStyle='#f0ede6';
    cx.font=`200 ${FS()}px 'Raleway',sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor='rgba(200,196,188,.2)';cx.shadowBlur=18;cx.fillText('luxhiro',W/2,H/2);cx.shadowBlur=0;cx.globalAlpha=1;
  }

  // Vignette — stronger in drift/lonely phases
  const vigStr=stage===ST.DRIFT||stage===ST.HESITATE?.9:.78;
  const vig=cx.createRadialGradient(W/2,H/2,H*.18,W/2,H/2,H*.88);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,`rgba(0,0,0,${vigStr})`);
  cx.fillStyle=vig;cx.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════
// START
// ═══════════════════════════════════════
function begin(){
  if(started)return;started=true;A();
  hint.style.transition='opacity .8s';hint.style.opacity='0';
  setTimeout(()=>hint.style.display='none',900);
  build();go(ST.SHOW);stageT=0;lastNow=null;
  setTimeout(()=>playChord(),220);
  dustIntensity=.15;
}
document.addEventListener('click',begin,{once:true});
document.addEventListener('touchstart',begin,{once:true,passive:true});

initDust();requestAnimationFrame(loop);
</script>
