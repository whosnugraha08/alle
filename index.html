<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alle</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#060606;overflow:hidden;}
  canvas{position:fixed;inset:0;}
  #ui{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:none;}
  #hint{
    font-family:'Raleway',sans-serif;font-weight:200;
    font-size:12px;letter-spacing:0.55em;color:rgba(255,255,255,0.28);
    text-transform:lowercase;pointer-events:all;cursor:pointer;
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.85;}}
  #label{
    position:fixed;left:50%;z-index:15;pointer-events:none;
    font-family:'Raleway',sans-serif;font-weight:200;
    font-size:clamp(9px,0.8vw,11px);letter-spacing:0.65em;
    color:rgba(240,238,232,0.2);white-space:nowrap;
    opacity:0;transition:opacity 4s ease;text-transform:lowercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"><div id="hint">tap to begin</div></div>
<div id="label">formerly known as luxhiro</div>

<script>
// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('hint');
const label  = document.getElementById('label');
let W, H;
let shakeX=0, shakeY=0, shakeMag=0;

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  const dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
}
resize(); window.addEventListener('resize',resize);

// ═══════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════
let ac;
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}

// Master reverb
let reverbNode=null;
async function getReverb(){
  if(reverbNode)return reverbNode;
  const a=getAC();
  const len=a.sampleRate*2.5;
  const buf=a.createBuffer(2,len,a.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);
  }
  reverbNode=a.createConvolver();
  reverbNode.buffer=buf;
  reverbNode.connect(a.destination);
  return reverbNode;
}

function connect(node){node.connect(ac.destination);return node;}

// Deep cinematic BOOM
function playBoom(){
  const a=getAC();
  // Sub bass hit
  const osc=a.createOscillator();
  const g=a.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(80,a.currentTime);
  osc.frequency.exponentialRampToValueAtTime(28,a.currentTime+0.6);
  g.gain.setValueAtTime(0,a.currentTime);
  g.gain.linearRampToValueAtTime(0.7,a.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.65);
  osc.connect(g);connect(g);osc.start();osc.stop(a.currentTime+0.7);

  // Noise burst
  const buf=a.createBuffer(1,a.sampleRate*0.35,a.sampleRate);
  const dd=buf.getChannelData(0);
  for(let i=0;i<dd.length;i++) dd[i]=(Math.random()*2-1)*Math.pow(1-i/dd.length,1.2);
  const ns=a.createBufferSource(); ns.buffer=buf;
  const flt=a.createBiquadFilter(); flt.type='lowpass';
  flt.frequency.setValueAtTime(3200,a.currentTime);
  flt.frequency.exponentialRampToValueAtTime(180,a.currentTime+0.3);
  const ng=a.createGain();
  ng.gain.setValueAtTime(0.45,a.currentTime);
  ng.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.32);
  ns.connect(flt);flt.connect(ng);connect(ng);ns.start();

  // High crack
  const crack=a.createBuffer(1,a.sampleRate*0.06,a.sampleRate);
  const cd=crack.getChannelData(0);
  for(let i=0;i<cd.length;i++) cd[i]=(Math.random()*2-1)*Math.pow(1-i/cd.length,0.6);
  const cs=a.createBufferSource();cs.buffer=crack;
  const cf=a.createBiquadFilter();cf.type='highpass';cf.frequency.value=4000;
  const cg=a.createGain();cg.gain.setValueAtTime(0.3,a.currentTime);
  cg.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.06);
  cs.connect(cf);cf.connect(cg);connect(cg);cs.start();
}

// Whoosh with pitch sweep
function playWhoosh(pitch=1,vol=0.22,duration=0.7){
  const a=getAC();
  const buf=a.createBuffer(2,a.sampleRate*duration,a.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.4);
  }
  const src=a.createBufferSource();src.buffer=buf;src.playbackRate.value=pitch;
  const flt=a.createBiquadFilter();flt.type='bandpass';
  flt.frequency.setValueAtTime(900*pitch,a.currentTime);
  flt.frequency.exponentialRampToValueAtTime(120,a.currentTime+duration);
  flt.Q.value=1.2;
  const g=a.createGain();
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+duration*0.9);
  src.connect(flt);flt.connect(g);connect(g);src.start();
}

// Funny boing on bounce
function playBoing(pitch=1){
  const a=getAC();
  const osc=a.createOscillator();
  const g=a.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(260*pitch,a.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80*pitch,a.currentTime+0.18);
  g.gain.setValueAtTime(0.14,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.2);
  osc.connect(g);connect(g);osc.start();osc.stop(a.currentTime+0.22);
}

// Magnetic hum (rising tension before alle forms)
let humSrc=null, humGain=null;
function startHum(){
  const a=getAC();
  humGain=a.createGain();humGain.gain.value=0;
  const osc=a.createOscillator();osc.type='sawtooth';
  osc.frequency.setValueAtTime(55,a.currentTime);
  osc.frequency.linearRampToValueAtTime(110,a.currentTime+1.8);
  const flt=a.createBiquadFilter();flt.type='lowpass';flt.frequency.value=200;
  osc.connect(flt);flt.connect(humGain);connect(humGain);
  osc.start();humSrc=osc;
  humGain.gain.linearRampToValueAtTime(0.08,a.currentTime+0.4);
}
function stopHum(){
  if(!humGain)return;
  humGain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);
}

// Cinematic "ALLE" lock-in: ascending tones + sparkle
function playAlleReveal(){
  const a=getAC();
  // Ascending power chord
  [[130,0],[196,0.06],[261,0.12],[392,0.18]].forEach(([f,t])=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='triangle';o.frequency.value=f;
    const ct=a.currentTime+t;
    g.gain.setValueAtTime(0,ct);
    g.gain.linearRampToValueAtTime(0.12,ct+0.04);
    g.gain.exponentialRampToValueAtTime(0.001,ct+2.2);
    o.connect(g);connect(g);o.start(ct);o.stop(ct+2.4);
  });
  // High sparkle shimmer
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      const o=a.createOscillator(),g=a.createGain();
      o.type='sine';o.frequency.value=1800+Math.random()*1400;
      g.gain.setValueAtTime(0.07,a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.6);
      o.connect(g);connect(g);o.start();o.stop(a.currentTime+0.65);
    },i*85);
  }
  // Deep satisfying thud
  const o2=a.createOscillator(),g2=a.createGain();
  o2.type='sine';o2.frequency.setValueAtTime(100,a.currentTime);
  o2.frequency.exponentialRampToValueAtTime(40,a.currentTime+0.25);
  g2.gain.setValueAtTime(0.3,a.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.28);
  o2.connect(g2);connect(g2);o2.start();o2.stop(a.currentTime+0.3);
}

// Per-letter lock click
function playLetterLock(i){
  const a=getAC();
  const freqs=[440,528,594,660];
  const o=a.createOscillator(),g=a.createGain();
  o.type='square';o.frequency.value=freqs[i%4]*2;
  g.gain.setValueAtTime(0.08,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.09);
  o.connect(g);connect(g);o.start();o.stop(a.currentTime+0.1);
}

// ═══════════════════════════════════════════════
// PARTICLES (sparks)
// ═══════════════════════════════════════════════
const sparks=[];
function emitSparks(x,y,n=12,col='#ffffff'){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=1.5+Math.random()*5;
    sparks.push({
      x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1.5,
      life:1,decay:0.028+Math.random()*0.04,
      sz:0.8+Math.random()*2.2, col
    });
  }
}
function updateSparks(){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.15;
    s.vx*=0.96; s.vy*=0.96;
    s.life-=s.decay;
    if(s.life<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=s.life*s.life;
    ctx.fillStyle=s.col;
    ctx.beginPath();ctx.arc(s.x,s.y,s.sz*s.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════
// SCREEN SHAKE
// ═══════════════════════════════════════════════
function triggerShake(mag){shakeMag=Math.max(shakeMag,mag);}
function updateShake(){
  if(shakeMag>0.2){
    shakeX=(Math.random()-0.5)*shakeMag*2;
    shakeY=(Math.random()-0.5)*shakeMag*2;
    shakeMag*=0.82;
  } else { shakeX=0;shakeY=0;shakeMag=0; }
}

// ═══════════════════════════════════════════════
// LETTER CLASS
// ═══════════════════════════════════════════════
class Letter{
  constructor(char,x,y,fs){
    this.char=char; this.x=x; this.y=y;
    this.tx=x; this.ty=y;
    this.vx=0; this.vy=0;
    this.angle=0; this.va=0;
    this.scale=1; this.alpha=0;
    this.fs=fs;
    this.mode='idle'; // idle|fly|orbit|home|locked
    this.trail=[];
    this.trailLen=9;
    this.bounceCount=0;
    this.orbitAngle=0;
    this.orbitR=0;
    this.orbitSpeed=0;
    this.phi=Math.random()*Math.PI*2;
    this.glowAmt=0;
    this.locked=false;
    this.squishX=1; this.squishY=1;
  }

  launch(){
    this.mode='fly';
    this.trail=[];
    const ang=-Math.PI*0.5 + (Math.random()-0.5)*Math.PI*2.2;
    const spd=10+Math.random()*22;
    this.vx=Math.cos(ang)*spd;
    this.vy=Math.sin(ang)*spd - (3+Math.random()*5);
    this.va=(Math.random()-0.5)*0.52;
    this.bounceCount=0;
  }

  startOrbit(cx,cy){
    this.mode='orbit';
    const dx=this.x-cx, dy=this.y-cy;
    this.orbitR=Math.sqrt(dx*dx+dy*dy);
    this.orbitAngle=Math.atan2(dy,dx);
    this.orbitSpeed=(Math.random()<0.5?1:-1)*(0.04+Math.random()*0.04);
  }

  goHome(tx,ty){
    this.tx=tx; this.ty=ty;
    this.mode='home'; this.locked=false;
  }

  update(dt,t){
    // Trail record
    if(this.mode==='fly'||this.mode==='orbit'){
      this.trail.push({x:this.x,y:this.y,a:this.alpha});
      if(this.trail.length>this.trailLen) this.trail.shift();
    } else {
      this.trail=[];
    }

    // Squish decay
    this.squishX+=(1-this.squishX)*0.18;
    this.squishY+=(1-this.squishY)*0.18;

    if(this.mode==='idle'){
      this.alpha=Math.min(this.alpha+dt*1.5,0.95);
      this.glowAmt=0.6+Math.sin(t*1.2+this.phi)*0.3;

    } else if(this.mode==='fly'){
      this.vy+=0.42;
      this.vx*=0.991; this.vy*=0.991;
      this.x+=this.vx; this.y+=this.vy;
      this.angle+=this.va; this.va*=0.997;

      const pad=this.fs*0.5;
      let bounced=false;
      if(this.x<pad){
        this.x=pad; this.vx=Math.abs(this.vx)*(0.55+Math.random()*0.25);
        this.va=(Math.random()-0.5)*0.45; bounced=true;
        this.squishX=0.55; this.squishY=1.45;
      }
      if(this.x>W-pad){
        this.x=W-pad; this.vx=-Math.abs(this.vx)*(0.55+Math.random()*0.25);
        this.va=(Math.random()-0.5)*0.45; bounced=true;
        this.squishX=0.55; this.squishY=1.45;
      }
      if(this.y>H+pad*2){this.y=-pad; this.vy*=-0.4;}
      if(this.y<-pad*5){this.vy=Math.abs(this.vy)*0.5;}

      if(bounced){
        this.bounceCount++;
        emitSparks(this.x,this.y,8,'#e8e4dc');
        playBoing(0.7+Math.random()*0.8);
      }
      this.alpha=0.92;
      this.glowAmt=0.3;

    } else if(this.mode==='orbit'){
      this.orbitAngle+=this.orbitSpeed*(1+0.3*Math.sin(t));
      this.orbitR*=0.97;
      this.x=W/2+Math.cos(this.orbitAngle)*this.orbitR;
      this.y=H/2+Math.sin(this.orbitAngle)*this.orbitR;
      this.angle+=0.06; this.alpha=0.88;
      this.glowAmt=0.5+Math.sin(t*3+this.phi)*0.4;

    } else if(this.mode==='home'){
      const dx=this.tx-this.x, dy=this.ty-this.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const k=0.12+0.06*Math.min(1,t);
      this.vx+=dx*k; this.vy+=dy*k;
      this.vx*=0.76; this.vy*=0.76;
      this.x+=this.vx; this.y+=this.vy;
      this.angle+=(0-this.angle)*0.14;
      this.alpha=Math.min(1,this.alpha+dt*2);
      this.glowAmt=0.8;

      if(dist<1.8&&!this.locked){
        this.locked=true; this.mode='locked';
        this.x=this.tx; this.y=this.ty;
        this.squishX=1.4; this.squishY=0.65;
        emitSparks(this.x,this.y,14,'#ffffff');
        return 'locked';
      }

    } else if(this.mode==='locked'){
      this.angle+=(0-this.angle)*0.2;
      this.alpha=0.97+Math.sin(t*0.8+this.phi)*0.03;
      this.glowAmt=1;
    }
    return null;
  }

  draw(){
    // Draw trail
    for(let i=0;i<this.trail.length;i++){
      const tr=this.trail[i];
      const frac=i/this.trail.length;
      ctx.save();
      ctx.translate(tr.x+shakeX, tr.y+shakeY);
      ctx.globalAlpha=frac*0.18*this.alpha;
      ctx.fillStyle='#e8e4dc';
      ctx.font=`200 ${this.fs*0.9}px 'Raleway',sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(this.char,0,0);
      ctx.restore();
    }

    ctx.save();
    ctx.translate(this.x+shakeX, this.y+shakeY);
    ctx.rotate(this.angle);
    ctx.scale(this.squishX, this.squishY);

    // Glow
    if(this.glowAmt>0.1){
      ctx.shadowColor='rgba(220,215,205,0.55)';
      ctx.shadowBlur=22*this.glowAmt;
    }

    ctx.globalAlpha=Math.max(0,Math.min(1,this.alpha));
    ctx.fillStyle='#f0ede6';
    ctx.font=`200 ${this.fs}px 'Raleway',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.char,0,0);
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// TEXT LAYOUT
// ═══════════════════════════════════════════════
function getPositions(word,fs,cx,cy){
  ctx.font=`200 ${fs}px 'Raleway',sans-serif`;
  ctx.textAlign='left'; ctx.textBaseline='middle';
  let cursor=cx-ctx.measureText(word).width/2;
  return [...word].map(ch=>{
    const w=ctx.measureText(ch).width;
    const pos={x:cursor+w/2,y:cy};
    cursor+=w; return pos;
  });
}

// ═══════════════════════════════════════════════
// MAIN STATE MACHINE
// ═══════════════════════════════════════════════
let letters=[];
let state='waiting';
let phaseT=0;
let lastNow=null;
let globalT=0;
let started=false;
let locksGotten=0;

const FS = ()=>Math.min(W*0.118,158);

function buildLuxhiro(){
  const fs=FS();
  const pos=getPositions('luxhiro',fs,W/2,H/2);
  letters=pos.map((p,i)=>new Letter('luxhiro'[i],p.x,p.y,fs));
}

function doScatter(){
  state='scatter'; phaseT=0;
  playBoom(); triggerShake(18);
  emitSparks(W/2,H/2,30,'#e8e4dc');
  emitSparks(W/2,H/2,20,'#ffffff');
  letters.forEach((l,i)=>setTimeout(()=>{l.launch();playWhoosh(0.8+Math.random()*0.5,0.12,0.4);},i*30));
}

function doOrbit(){
  state='orbit'; phaseT=0;
  playWhoosh(1.4,0.18,1.1);
  startHum();
  letters.forEach((l,i)=>setTimeout(()=>l.startOrbit(W/2,H/2),i*60));
}

function doGather(){
  state='gather'; phaseT=0;
  stopHum();
  playWhoosh(2,0.25,0.8);
  triggerShake(8);

  const fs=FS()*1.1;
  const pos=getPositions('alle',fs,W/2,H/2);
  const alleChars='alle';
  const map=[[0,0],[1,1],[2,2],[3,3]]; // first 4 luxhiro → alle letters

  // Letters 0-3 become 'alle'
  map.forEach(([li,ai],idx)=>{
    const l=letters[li];
    setTimeout(()=>{
      l.char=alleChars[ai];
      l.fs=fs;
      l.goHome(pos[ai].x,pos[ai].y);
    },idx*80);
  });

  // Letters 4-6 fly off screen dramatically
  ['i','r','o'].forEach((ch,idx)=>{
    const l=letters[4+idx];
    setTimeout(()=>{
      l.vy=-18-Math.random()*8;
      l.vx=(Math.random()-0.5)*14;
      l.va=(Math.random()-0.5)*0.5;
      l.mode='fly';
      // Fade out
      const fade=()=>{l.alpha=Math.max(0,l.alpha-0.025);if(l.alpha>0)requestAnimationFrame(fade);};
      fade();
      playWhoosh(1.2+idx*0.2,0.1,0.35);
    },idx*60);
  });

  label.style.top='50%';
  label.style.transform=`translate(-50%,${FS()*1.1*0.86}px)`;
  locksGotten=0;
}

// ═══════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════
function loop(now){
  requestAnimationFrame(loop);
  const dt=lastNow?Math.min((now-lastNow)/1000,0.05):0;
  lastNow=now; phaseT+=dt; globalT+=dt;

  updateShake();

  // Background
  ctx.fillStyle='rgba(6,6,6,1)';
  ctx.fillRect(0,0,W,H);

  // Atmospheric dust
  if(state==='scatter'||state==='orbit'){
    ctx.fillStyle='rgba(6,6,6,0.08)';
    ctx.fillRect(0,0,W,H);
  }

  // State transitions
  if(state==='show'&&phaseT>1.8) doScatter();
  if(state==='scatter'&&phaseT>3.0) doOrbit();
  if(state==='orbit'&&phaseT>2.2) doGather();
  if(state==='gather'&&phaseT>4.0&&label.style.opacity!=='1'){
    label.style.opacity='1';
  }

  // Update + draw letters
  for(const l of letters){
    const ev=l.update(dt,globalT);
    if(ev==='locked'){
      locksGotten++;
      playLetterLock(locksGotten-1);
      if(locksGotten===4){
        setTimeout(()=>{playAlleReveal();triggerShake(6);},100);
        state='done';
      }
    }
    l.draw();
  }

  updateSparks();

  // Idle dim text
  if(state==='waiting'){
    ctx.globalAlpha=0.08;
    ctx.fillStyle='#f0ede6';
    ctx.font=`200 ${FS()}px 'Raleway',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(200,196,188,0.4)'; ctx.shadowBlur=18;
    ctx.fillText('luxhiro',W/2,H/2);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.78)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
function begin(){
  if(started)return; started=true;
  getAC();
  hint.style.transition='opacity 0.8s'; hint.style.opacity='0';
  setTimeout(()=>document.getElementById('ui').style.display='none',900);
  buildLuxhiro();
  state='show'; phaseT=0; lastNow=null;
}

document.addEventListener('click',begin,{once:true});
document.addEventListener('touchstart',begin,{once:true,passive:true});

requestAnimationFrame(loop);
</script>
